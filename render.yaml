services:
  - type: web
    name: gestion-appels-offres-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: gestion-appels-offres-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://gestion-offres-nine.vercel.app,http://localhost:4173"
      - key: UPLOAD_DIR
        value: uploads

databases:
  - name: gestion-appels-offres-db
    plan: free
    databaseName: gestion_appels_offres
    user: gestion_appels_offres
